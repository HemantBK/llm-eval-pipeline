# Grafana dashboard provisioning — auto-load dashboard JSON
apiVersion: 1

providers:
  - name: "LLM Eval Pipeline"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
